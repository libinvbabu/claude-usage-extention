<svg xmlns="http://www.w3.org/2000/svg" width="420" height="660" viewBox="0 0 420 660" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97757"/>
      <stop offset="1" stop-color="#b85c3e"/>
    </linearGradient>
  </defs>

  <!-- panel shell -->
  <rect width="420" height="660" rx="16" fill="#262522" stroke="rgba(255,255,255,0.12)"/>

  <!-- header -->
  <rect x="16" y="18" width="20" height="20" rx="6" fill="url(#logo)"/>
  <text x="44" y="33" fill="rgba(255,255,255,0.92)" font-size="14" font-weight="600">Claude Usage Pace</text>
  <text x="404" y="33" fill="rgba(255,255,255,0.62)" font-size="13" text-anchor="end">Options</text>

  <!-- recommendation -->
  <rect x="16" y="52" width="388" height="132" rx="12" fill="#211f1d" stroke="rgba(255,255,255,0.12)"/>
  <rect x="16" y="52" width="4" height="132" rx="2" fill="#6fbd9a"/>
  <rect x="32" y="66" width="80" height="20" rx="10" fill="#6fbd9a" fill-opacity="0.16"/>
  <circle cx="45" cy="76" r="3.5" fill="#6fbd9a"/>
  <text x="55" y="80" fill="#6fbd9a" font-size="11" font-weight="600">Under pace</text>
  <text x="122" y="80" fill="rgba(255,255,255,0.92)" font-size="14" font-weight="600">Good window for heavy work</text>
  <text x="32" y="110" fill="rgba(255,255,255,0.62)" font-size="12.5">You're under pace for both session and weekly limits.</text>
  <text x="32" y="128" fill="rgba(255,255,255,0.62)" font-size="12.5">Large Claude Code tasks can still drain usage quickly,</text>
  <text x="32" y="146" fill="rgba(255,255,255,0.62)" font-size="12.5">especially with long context.</text>
  <line x1="32" y1="160" x2="388" y2="160" stroke="rgba(255,255,255,0.12)"/>
  <text x="32" y="177" fill="rgba(255,255,255,0.42)" font-size="10.5" letter-spacing="0.5">CURRENT BOTTLENECK</text>
  <text x="388" y="177" fill="#6fbd9a" font-size="12" font-weight="600" text-anchor="end">None</text>

  <!-- current session -->
  <rect x="16" y="200" width="388" height="172" rx="12" fill="#302f2b" stroke="rgba(255,255,255,0.12)"/>
  <text x="32" y="224" fill="rgba(255,255,255,0.92)" font-size="14" font-weight="600">Current session</text>
  <text x="388" y="224" fill="rgba(255,255,255,0.42)" font-size="12" text-anchor="end">31% used</text>
  <text x="32" y="258" fill="rgba(255,255,255,0.92)" font-size="26" font-weight="700">69%</text>
  <text x="92" y="258" fill="rgba(255,255,255,0.62)" font-size="13">left · Resets in 1h 42m · 5:30 PM</text>
  <rect x="32" y="272" width="340" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="32" y="272" width="105" height="8" rx="4" fill="#6fbd9a"/>
  <rect x="256" y="270" width="2" height="12" rx="1" fill="rgba(255,255,255,0.85)"/>
  <text x="32" y="304" fill="rgba(255,255,255,0.42)" font-size="10.5" letter-spacing="0.5">PACE</text>
  <text x="32" y="322" fill="rgba(255,255,255,0.92)" font-size="14">35 pts under pace</text>
  <text x="216" y="304" fill="rgba(255,255,255,0.42)" font-size="10.5" letter-spacing="0.5">SAFE PACE</text>
  <text x="216" y="322" fill="rgba(255,255,255,0.92)" font-size="14">~40.6% / hr</text>
  <text x="32" y="346" fill="rgba(255,255,255,0.42)" font-size="10.5" letter-spacing="0.5">UNUSED IF PACE CONTINUES</text>
  <text x="32" y="366" fill="rgba(255,255,255,0.92)" font-size="18" font-weight="600">~53%</text>

  <!-- weekly cards (two columns) -->
  <rect x="16" y="388" width="188" height="86" rx="12" fill="#302f2b" stroke="rgba(255,255,255,0.12)"/>
  <text x="30" y="410" fill="rgba(255,255,255,0.92)" font-size="12.5" font-weight="600">Weekly · all models</text>
  <text x="30" y="440" fill="rgba(255,255,255,0.92)" font-size="20" font-weight="700">96%</text>
  <text x="78" y="440" fill="rgba(255,255,255,0.62)" font-size="11">left</text>
  <text x="30" y="462" fill="rgba(255,255,255,0.62)" font-size="11">Resets Wed 3:30 AM</text>

  <rect x="216" y="388" width="188" height="86" rx="12" fill="#302f2b" stroke="rgba(255,255,255,0.12)"/>
  <text x="230" y="410" fill="rgba(255,255,255,0.92)" font-size="12.5" font-weight="600">Weekly · Sonnet</text>
  <text x="230" y="440" fill="rgba(255,255,255,0.92)" font-size="20" font-weight="700">100%</text>
  <text x="288" y="440" fill="rgba(255,255,255,0.62)" font-size="11">left</text>
  <text x="230" y="462" fill="rgba(255,255,255,0.62)" font-size="11">Resets Wed 3:30 AM</text>

  <!-- task guidance -->
  <rect x="16" y="490" width="388" height="86" rx="12" fill="#302f2b" stroke="rgba(255,255,255,0.12)"/>
  <text x="32" y="514" fill="rgba(255,255,255,0.42)" font-size="10.5" letter-spacing="0.5">GOOD FOR</text>
  <text x="32" y="532" fill="rgba(255,255,255,0.62)" font-size="12.5">Small questions · Debugging · One larger task</text>
  <text x="32" y="554" fill="rgba(255,255,255,0.42)" font-size="10.5" letter-spacing="0.5">BEFORE A LARGE TASK</text>
  <text x="32" y="572" fill="rgba(255,255,255,0.62)" font-size="12.5">Run /clear, then give a focused task brief.</text>

  <!-- footer -->
  <line x1="16" y1="592" x2="404" y2="592" stroke="rgba(255,255,255,0.12)"/>
  <text x="16" y="613" fill="rgba(255,255,255,0.42)" font-size="12">Based on Claude's visible usage bars. Local-only.</text>
  <text x="16" y="635" fill="rgba(255,255,255,0.42)" font-size="11">Last read from page: just now</text>
  <rect x="346" y="620" width="58" height="22" rx="8" fill="#302f2b" stroke="rgba(255,255,255,0.18)"/>
  <text x="375" y="635" fill="rgba(255,255,255,0.92)" font-size="11" text-anchor="middle">Re-read</text>
</svg>
