<svg xmlns="http://www.w3.org/2000/svg" width="380" height="430" viewBox="0 0 380 430" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="380" height="430" rx="16" fill="#1f1e1d"/>
  <g transform="translate(16,16)">
    <rect width="348" height="398" rx="14" fill="#262624" stroke="rgba(255,255,255,0.1)"/>
    <g transform="translate(16,16)">
      <!-- header -->
      <rect width="18" height="18" rx="5" fill="#d97757"/>
      <text x="26" y="13" fill="#f1efe7" font-size="13" font-weight="600">Claude Usage Pace</text>
      <text x="316" y="13" fill="#a8a49b" font-size="11" text-anchor="end">⚙ Options</text>

      <!-- recommendation -->
      <g transform="translate(0,30)">
        <rect width="316" height="56" rx="10" fill="#1f1e1d" stroke="rgba(255,255,255,0.1)"/>
        <rect width="3" height="56" rx="2" fill="#6cae8f"/>
        <circle cx="20" cy="20" r="4" fill="#6cae8f"/>
        <text x="30" y="24" fill="#6cae8f" font-size="11" font-weight="600">Under pace</text>
        <text x="110" y="24" fill="#f1efe7" font-size="12" font-weight="600">Good time for heavy work</text>
        <text x="14" y="44" fill="#a8a49b" font-size="11">Meaningful session and weekly headroom.</text>
      </g>

      <!-- session card -->
      <g transform="translate(0,98)">
        <rect width="316" height="120" rx="10" fill="#2f2e2c" stroke="rgba(255,255,255,0.1)"/>
        <text x="14" y="24" fill="#f1efe7" font-size="12.5" font-weight="600">Current session</text>
        <text x="302" y="24" fill="#7f7b72" font-size="11" text-anchor="end">9% used</text>
        <text x="14" y="52" fill="#f1efe7" font-size="20" font-weight="700">91%</text>
        <text x="66" y="52" fill="#a8a49b" font-size="11.5">left · Resets in 3h 31m</text>
        <!-- bar -->
        <rect x="14" y="64" width="288" height="7" rx="4" fill="rgba(255,255,255,0.09)"/>
        <rect x="14" y="64" width="26" height="7" rx="4" fill="#6cae8f"/>
        <rect x="100" y="62" width="2" height="11" rx="1" fill="#f1efe7" opacity="0.55"/>
        <!-- metrics -->
        <text x="14" y="92" fill="#7f7b72" font-size="10.5">PACE</text>
        <text x="14" y="106" fill="#f1efe7" font-size="12">21 pts under pace</text>
        <text x="160" y="92" fill="#7f7b72" font-size="10.5">SAFE PACE</text>
        <text x="160" y="106" fill="#f1efe7" font-size="12">~26% / hr</text>
      </g>

      <!-- weekly card -->
      <g transform="translate(0,228)">
        <rect width="316" height="64" rx="10" fill="#2f2e2c" stroke="rgba(255,255,255,0.1)"/>
        <text x="14" y="24" fill="#f1efe7" font-size="12.5" font-weight="600">Weekly · all models</text>
        <text x="302" y="24" fill="#7f7b72" font-size="11" text-anchor="end">2% used</text>
        <text x="14" y="48" fill="#f1efe7" font-size="16" font-weight="700">98%</text>
        <text x="58" y="48" fill="#a8a49b" font-size="11.5">left · Resets Wed 3:29 AM</text>
      </g>

      <!-- suggestion -->
      <g transform="translate(0,302)">
        <rect width="316" height="48" rx="10" fill="#1f1e1d" stroke="rgba(255,255,255,0.1)"/>
        <text x="14" y="20" fill="#7f7b72" font-size="10.5">SUGGESTION</text>
        <text x="14" y="38" fill="#a8a49b" font-size="11.5">Good window for a larger task. Start fresh with /clear.</text>
      </g>
    </g>
  </g>
</svg>
